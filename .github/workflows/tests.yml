name: Automatisation des tests
on: push

jobs:
  Compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v2
        
      - name: Compilation
        run: |
          mkdir build
          cd build
          cmake ..
          make
          
      - name: Upload de l'exécutable (pour les jobs suivants)
        uses: actions/upload-artifact@v2
        with:
          name: executable
          path: build/

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du code
        uses: actions/checkout@v2
        
      - name: Download de l'exécutable
        uses: actions/download-artifact@v2
        with:
          name: executable
          path: build/
          
      - name: Test Addition
        run: |
          chmod +x build/src/calculator
          ./build/src/calculator add 10 5

  Test_Sub:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du code
        uses: actions/checkout@v2
        
      - name: Download de l'exécutable
        uses: actions/download-artifact@v2
        with:
          name: executable
          path: build/
          
      - name: Test Soustraction
        run: |
          chmod +x build/src/calculator
          ./build/src/calculator sub 10 5

  Test_Mul:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du code
        uses: actions/checkout@v2
        
      - name: Download de l'exécutable
        uses: actions/download-artifact@v2
        with:
          name: executable
          path: build/
          
      - name: Test Multiplication
        run: |
          chmod +x build/src/calculator
          ./build/src/calculator mul 10 5

  Test_Div:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du code
        uses: actions/checkout@v2
        
      - name: Download de l'exécutable
        uses: actions/download-artifact@v2
        with:
          name: executable
          path: build/
          
      - name: Test Division
        run: |
          chmod +x build/src/calculator
          ./build/src/calculator div 10 5

